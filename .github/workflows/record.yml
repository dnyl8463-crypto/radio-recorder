name: Radio Recorder Parallel

on:
  schedule:
    - cron: '0 * * * *' # יבדוק כל שעה אם צריך להתחיל
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    # הגדרת זמן ריצה מקסימלי ל-8 שעות כדי שלא ייקטע בלילה
    timeout-minutes: 480 
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install requests
      - run: python main.py
      - name: Release
        uses: softprops/action-gh-release@v1
        if: hashFiles('*.mp3') != ''
        with:
          tag_name: "night-${{ github.run_id }}"
          name: "הקלטה - ${{ github.run_number }}"
          files: "*.mp3"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
